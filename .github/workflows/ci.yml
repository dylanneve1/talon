name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint, format, and type-check ──────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.PAT || github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-22-${{ hashFiles('package.json') }}
          restore-keys: node-modules-${{ runner.os }}-22-

      - run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Check for .only/.skip in tests
        run: |
          if grep -rn '\.only\s*(' --include='*.test.ts' src/__tests__/ || \
             grep -rn '\.skip\s*(' --include='*.test.ts' src/__tests__/; then
            echo "::error::Found .only() or .skip() in test files — remove before merging"
            exit 1
          fi

      - name: Dead code analysis (informational)
        run: npx knip --no-exit-code
        continue-on-error: true

      - name: Format check
        id: format-check
        run: npm run format:check
        continue-on-error: true

      - name: Auto-format and push
        if: steps.format-check.outcome == 'failure'
        run: |
          npm run format
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: auto-format with prettier" || exit 0
          git push

  # ── Unit & integration tests (matrix) ─────────────────────────
  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('package.json') }}
          restore-keys: node-modules-${{ runner.os }}-${{ matrix.node-version }}-

      - run: npm install

      - name: Run tests
        run: npx vitest run --reporter=verbose --reporter=json --outputFile=test-results.json

      - name: Test summary
        if: always()
        run: |
          if [ -f test-results.json ]; then
            PASSED=$(node -e "const r=JSON.parse(require('fs').readFileSync('test-results.json','utf8')); console.log(r.numPassedTests ?? 0)")
            FAILED=$(node -e "const r=JSON.parse(require('fs').readFileSync('test-results.json','utf8')); console.log(r.numFailedTests ?? 0)")
            TOTAL=$(node -e "const r=JSON.parse(require('fs').readFileSync('test-results.json','utf8')); console.log(r.numTotalTests ?? 0)")
            SUITES=$(node -e "const r=JSON.parse(require('fs').readFileSync('test-results.json','utf8')); console.log(r.numTotalTestSuites ?? 0)")
            DURATION=$(node -e "const r=JSON.parse(require('fs').readFileSync('test-results.json','utf8')); const ms=r.testResults?.reduce((s,t)=>s+(t.endTime-t.startTime),0)??0; console.log((ms/1000).toFixed(1))")
            echo "### Test Results (Node ${{ matrix.node-version }})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Suites | $SUITES |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| Total  | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: test-results.json
          retention-days: 30

  # ── Coverage (runs after tests pass) ──────────────────────────
  coverage:
    name: Coverage
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-22-${{ hashFiles('package.json') }}
          restore-keys: node-modules-${{ runner.os }}-22-

      - run: npm install

      - name: Run tests with coverage
        run: npx vitest run --coverage --reporter=verbose --reporter=json --outputFile=test-results.json

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Category | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
            node -e "
              const c = JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json','utf8')).total;
              for (const [k,v] of Object.entries(c)) {
                console.log('| ' + k.charAt(0).toUpperCase() + k.slice(1) + ' | ' + v.pct + '% |');
              }
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # ── Fuzz testing (property-based with fast-check) ─────────────
  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-22-${{ hashFiles('package.json') }}
          restore-keys: node-modules-${{ runner.os }}-22-

      - run: npm install

      - name: Run fuzz tests (extended iterations)
        run: npx vitest run --reporter=verbose --reporter=json --outputFile=fuzz-results.json src/__tests__/fuzz.test.ts
        env:
          FAST_CHECK_NUM_RUNS: "10000"

      - name: Fuzz summary
        if: always()
        run: |
          if [ -f fuzz-results.json ]; then
            PASSED=$(node -e "const r=JSON.parse(require('fs').readFileSync('fuzz-results.json','utf8')); console.log(r.numPassedTests ?? 0)")
            FAILED=$(node -e "const r=JSON.parse(require('fs').readFileSync('fuzz-results.json','utf8')); console.log(r.numFailedTests ?? 0)")
            TOTAL=$(node -e "const r=JSON.parse(require('fs').readFileSync('fuzz-results.json','utf8')); console.log(r.numTotalTests ?? 0)")
            echo "### Fuzz Test Results (10,000 iterations/property)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | Failed | Total |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| $PASSED | $FAILED | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          fi

  # ── Security audit ────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-22-${{ hashFiles('package.json') }}
          restore-keys: node-modules-${{ runner.os }}-22-

      - run: npm install

      - name: Audit dependencies
        run: npm audit --audit-level=critical

  # ── Docker build validation ───────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t talon:ci-${{ github.sha }} .

  # ── Final status gate ─────────────────────────────────────────
  ci-ok:
    name: CI Status
    if: always()
    needs: [quality, test, coverage, fuzz, security]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check required jobs
        run: |
          if [[ "${{ needs.quality.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.coverage.result }}" != "success" ]] || \
             [[ "${{ needs.fuzz.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]]; then
            echo "::error::One or more required jobs failed"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality | ${{ needs.quality.result == 'success' && 'pass' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result == 'success' && 'pass' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.coverage.result == 'success' && 'pass' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fuzz | ${{ needs.fuzz.result == 'success' && 'pass' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result == 'success' && 'pass' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY

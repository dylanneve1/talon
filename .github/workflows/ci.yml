name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npx vitest run --reporter=verbose --reporter=json --outputFile=test-results.json

      - name: Test summary
        if: always()
        run: |
          if [ -f test-results.json ]; then
            PASSED=$(node -e "const r=require('./test-results.json'); console.log(r.numPassedTests ?? 0)")
            FAILED=$(node -e "const r=require('./test-results.json'); console.log(r.numFailedTests ?? 0)")
            TOTAL=$(node -e "const r=require('./test-results.json'); console.log(r.numTotalTests ?? 0)")
            echo "### Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | Failed | Total |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| $PASSED | $FAILED | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          fi

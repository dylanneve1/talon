name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: |
          npx vitest run --reporter=json --outputFile=test-results.json 2>&1 || true
          npx vitest run

      - name: Extract test stats
        if: always() && github.ref == 'refs/heads/main'
        id: tests
        run: |
          if [ -f test-results.json ]; then
            PASSED=$(node -e "const r=require('./test-results.json'); console.log(r.numPassedTests ?? 0)")
            FAILED=$(node -e "const r=require('./test-results.json'); console.log(r.numFailedTests ?? 0)")
            TOTAL=$(node -e "const r=require('./test-results.json'); console.log(r.numTotalTests ?? 0)")
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            if [ "$FAILED" = "0" ]; then
              echo "color=brightgreen" >> $GITHUB_OUTPUT
              echo "label=${PASSED} passing" >> $GITHUB_OUTPUT
            else
              echo "color=red" >> $GITHUB_OUTPUT
              echo "label=${PASSED} passing, ${FAILED} failing" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Update test badge
        if: always() && github.ref == 'refs/heads/main' && steps.tests.outputs.label
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.BADGE_GIST_ID }}
          filename: talon-tests.json
          label: tests
          message: ${{ steps.tests.outputs.label }}
          color: ${{ steps.tests.outputs.color }}

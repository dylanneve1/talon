name: Publish

on:
  release:
    types: [published]

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  # ── npm publish ────────────────────────────────────────────────
  npm:
    name: npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Verify package version matches tag
        run: |
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Verify the published package actually works ────────────────
  smoke-test:
    name: Smoke Test
    needs: [npm]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Wait for npm registry propagation
        run: sleep 15

      - name: Install published package
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          npm install talon-agent@"$TAG_VERSION"

      - name: Verify package contents
        run: |
          # Check critical files exist in installed package
          test -f node_modules/talon-agent/src/index.ts
          test -f node_modules/talon-agent/bin/talon.js
          test -d node_modules/talon-agent/prompts
          echo "Package contents verified"

  # ── Docker image → GHCR ───────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
